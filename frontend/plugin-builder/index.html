<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#155ef9" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/shared/icons/BBico.ico" type="image/x-icon" />
    
        <link rel="stylesheet" href="/shared/css/app-shell.css" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("app_theme") === "dark" ? "dark" : "light";
          document.documentElement.classList.add("theme-" + t);
        } catch (e) {
          document.documentElement.classList.add("theme-light");
        }
      })();
    </script>
    <script src="/shared/js/theme.js"></script>
    <script src="/shared/js/plugin-constants.js"></script>
    <script src="/shared/js/locales.js"></script>
    <script src="/shared/js/plugin-locales.js"></script>
    <script src="/shared/js/i18n.js"></script>

    <link rel="stylesheet" href="/shared/css/page-shell.css" />
    <link rel="stylesheet" href="plugin-builder.css" />
    <title data-i18n="plugin_builder.title">Component wizard</title>
  </head>
  <body>
    <div id="plugin-builder-root"></div>

    <script src="/shared/js/api-config.js"></script>
    <script src="/shared/js/plugin-constants.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script src="PluginBuilderView.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        if (window.PluginBuilderView && typeof window.PluginBuilderView.init === "function") {
          window.PluginBuilderView.init({ root: document.getElementById("plugin-builder-root") });
        }
      });
    </script>
  </body>
</html>
