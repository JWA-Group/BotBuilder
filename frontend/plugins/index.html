<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
        <link rel="stylesheet" href="/shared/css/app-shell.css" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("app_theme") === "dark" ? "dark" : "light";
          document.documentElement.classList.add("theme-" + t);
        } catch (e) {
          document.documentElement.classList.add("theme-light");
        }
      })();
    </script>
    <script src="/shared/js/theme.js"></script>
    <script src="/shared/js/plugin-constants.js"></script>
    <script src="/shared/js/locales.js"></script>
    <script src="/shared/js/plugin-locales.js"></script>
    <script src="/shared/js/i18n.js"></script>
    <script src="/shared/js/plugin-i18n.js"></script>

    <link rel="stylesheet" href="/shared/css/page-shell.css" />
    <link rel="stylesheet" href="plugins.css" />
    <title data-i18n="plugins.title">Plugins</title>
  </head>
  <body>
    <div id="plugins-root"></div>
    <script src="/shared/js/api-config.js"></script>
    <script src="/shared/js/plugin-constants.js"></script>
    <script src="PluginManagerView.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        if (window.PluginManagerView) {
          window.PluginManagerView.init({ root: document.getElementById("plugins-root") });
        }
      });
    </script>
  </body>
</html>
