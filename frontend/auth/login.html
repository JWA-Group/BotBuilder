<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="application-name" content="BotBuilder" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/shared/icons/BBico.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" href="/shared/icons/BBico.ico" />
    
        <link rel="stylesheet" href="/shared/css/app-shell.css" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("app_theme") === "dark" ? "dark" : "light";
          document.documentElement.classList.add("theme-" + t);
        } catch (e) {
          document.documentElement.classList.add("theme-light");
        }
      })();
    </script>
    <script src="/shared/js/theme.js"></script>
    <script src="/shared/js/locales.js"></script>
    <script src="/shared/js/i18n.js"></script>

    <title>Вход — BotBuilder</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card">
        <div class="logo-placeholder">B</div>
        <h1>Вход в аккаунт</h1>
        <p class="subtitle">Введите email и пароль или войдите через Google</p>

        <div id="auth-error" class="auth-error" role="alert"></div>
        <div id="auth-success" class="auth-success"></div>

        <a href="/api/auth/google" id="google-btn" class="google-btn">
          <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71 0-.593.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
          Войти через Google
        </a>

        <div class="auth-divider"><span>или</span></div>

        <form id="login-form" class="auth-form">
          <label for="login">Email</label>
          <input type="text" id="login" name="login" placeholder="Введите email" required autocomplete="username" />

          <label for="password">Пароль</label>
          <input type="password" id="password" name="password" placeholder="Введите пароль" required autocomplete="current-password" />

          <button type="submit" id="submit-btn">Войти</button>
        </form>

        <div class="auth-divider"></div>
        <p class="auth-footer">
          Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
        </p>
      </div>
    </div>

    <script src="/shared/js/api-config.js"></script>
    <script>
      (function () {
        var form = document.getElementById("login-form");
        var errorEl = document.getElementById("auth-error");
        var successEl = document.getElementById("auth-success");
        var submitBtn = document.getElementById("submit-btn");
        var params = new URLSearchParams(window.location.search);
        var errMsg = params.get("msg") || params.get("error");

        if (params.get("error")) {
          errorEl.textContent = decodeURIComponent(params.get("msg") || params.get("error") || "Ошибка");
          errorEl.classList.add("visible");
        }

        function showError(msg) {
          successEl.classList.remove("visible");
          errorEl.textContent = msg || "Ошибка входа";
          errorEl.classList.add("visible");
        }

        function showSuccess(msg) {
          errorEl.classList.remove("visible");
          successEl.textContent = msg || "Успешно";
          successEl.classList.add("visible");
        }

        function hideMessages() {
          errorEl.classList.remove("visible");
          successEl.classList.remove("visible");
        }

        form.addEventListener("submit", async function (e) {
          e.preventDefault();
          hideMessages();
          submitBtn.disabled = true;

          var loginVal = document.getElementById("login").value.trim();
          var password = document.getElementById("password").value;

          if (!loginVal || !password) {
            showError("Введите email и пароль");
            submitBtn.disabled = false;
            return;
          }

          try {
            var res = await fetch("/api/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ login: loginVal, password: password }),
            });

            var data = res.ok ? await res.json() : await res.json().catch(function () { return {}; });

            if (res.ok) {
              if (data.access_token) localStorage.setItem("access_token", data.access_token);
              var user = data.user || data;
              localStorage.setItem("user_id", user.id != null ? String(user.id) : "");
              localStorage.setItem("login", user.login || "");
              var redirect = params.get("redirect");
              window.location.href = redirect ? decodeURIComponent(redirect) : "/dashboard/index.html";
              return;
            }

            showError(data.detail || "Неверный email или пароль");
          } catch (err) {
            showError("Ошибка сети. Проверьте подключение.");
          }
          submitBtn.disabled = false;
        });
      })();
    </script>
  </body>
</html>
